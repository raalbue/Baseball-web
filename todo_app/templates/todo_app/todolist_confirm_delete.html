{% extends "base.html" %}
{% block content %}
<h2>Delete List</h2>
<p>Are you sure you want to delete the list <strong>{{ object.title }}</strong>?</p>
<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a class="btn btn-secondary" href="{% url 'index' %}">Cancel</a>
</form>
{% endblock %}
