{% extends "base.html" %}
{% block content %}
<h2>Delete To-do Item</h2>
<p>Are you sure you want to delete the item <strong>{{ object.title }}</strong>
   from the list <em>{{ todo_list.title }}</em>?</p>
<form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, delete</button>
    <a class="btn btn-secondary" href="{% url 'list' todo_list.id %}">Cancel</a>
</form>
{% endblock %}
