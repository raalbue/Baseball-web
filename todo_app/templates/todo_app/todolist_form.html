{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<h2>{{ title }}</h2>
<div class="row">
    <div class="col-md-6">
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary">Save</button>
            <a class="btn btn-secondary" href="{% url 'index' %}">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
