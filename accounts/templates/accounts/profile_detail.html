{% extends "base.html" %}
{% block content %}
<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h2 class="mb-0">Profile</h2>
            </div>
            <div class="card-body">
                <dl class="row mb-0">
                    <dt class="col-sm-4">Username</dt>
                    <dd class="col-sm-8">{{ request.user.get_username }}</dd>
                    <dt class="col-sm-4">Display name</dt>
                    <dd class="col-sm-8">{{ object.display_name|default:"—" }}</dd>
                    <dt class="col-sm-4">Bio</dt>
                    <dd class="col-sm-8">{{ object.bio|default:"—" }}</dd>
                    <dt class="col-sm-4">Address</dt>
                    <dd class="col-sm-8">{{ object.address|default:"—" }}</dd>
                </dl>
            </div>
            <div class="card-footer">
                <a href="{% url 'profile-edit' %}" class="btn btn-primary btn-sm">Edit profile</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
