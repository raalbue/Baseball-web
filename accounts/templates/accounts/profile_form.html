{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<h2>Edit Profile</h2>
<div class="row">
    <div class="col-md-6">
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'profile' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
