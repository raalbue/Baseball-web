{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}
<h2>{{ action }} User</h2>
<div class="row">
    <div class="col-md-6">
        <form method="post">
            {% csrf_token %}
            <h5 class="mb-3">Account</h5>
            {{ user_form|crispy }}
            <h5 class="mt-4 mb-3">Profile</h5>
            {{ profile_form|crispy }}
            <button type="submit" class="btn btn-primary">Save</button>
            <a class="btn btn-secondary" href="{% url 'manage:user-list' %}">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
